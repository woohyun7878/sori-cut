name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Each push to the default branch gets its own SHA-keyed concurrency group so
# every main commit runs to completion; PR and branch runs share a per-ref
# group and cancel superseded runs to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least-privilege token: CI only needs to read the repository.
permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, lint, test & build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm run build
